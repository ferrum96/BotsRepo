# Локальная разработка: docker compose -f docker-compose.dev.yml up
# Production на VPS: systemd — см. ../../DEPLOY.md
# Этот файл (docker-compose.yml) — альтернативный Docker-prod, не используется при systemd-деплое.

services:
  pubg-dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    container_name: pubg-dashboard
    restart: unless-stopped
    networks:
      - pubg-network

  pubg-api:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    container_name: pubg-api
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - pubg-network
    command: ["sh", "-c", "alembic upgrade head && python -m dashboard.backend.run"]

  pubg-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pubg-bot
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - pubg-network

  nginx:
    image: nginx:alpine
    container_name: pubg-nginx
    restart: unless-stopped
    ports:
      - "447:447"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pubg-network
    depends_on:
      - pubg-dashboard
      - pubg-api

networks:
  pubg-network:
    driver: bridge
