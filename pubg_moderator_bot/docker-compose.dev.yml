# Локальная разработка — см. ../../DEV.md
# Production на VPS — systemd, не этот compose.

services:
  pubg-dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile.dev
    container_name: pubg-dashboard
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./dashboard/frontend/src:/app/src
      - ./dashboard/frontend/public:/app/public
      - ./dashboard/frontend/index.html:/app/index.html
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - VITE_DEV_PORT=5174
      - DEV_API_TARGET=http://pubg-api:8080
      - VITE_DASHBOARD_API_KEY=${DASHBOARD_API_KEY}

  pubg-api:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile.dev
    container_name: pubg-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - ./.env
    volumes:
      - ./bot:/app/bot
      - ./dashboard/backend:/app/dashboard/backend
      - ./data:/app/data
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_PATH=/app/data/bot.db
      - DASHBOARD_PORT=8080
      - DASHBOARD_EVENTS_URL=
    command: ["sh", "-c", "alembic upgrade head && uvicorn dashboard.backend.main:app --host 0.0.0.0 --port 8080 --reload"]

  pubg-bot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pubg-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./.env
    volumes:
      - ./bot:/app/bot
      - ./data:/app/data
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      - DATABASE_PATH=/app/data/bot.db
      # Bot runs with host networking; API is published on localhost:8081.
      - DASHBOARD_EVENTS_URL=http://127.0.0.1:8081
