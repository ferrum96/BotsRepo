events {
    worker_connections 1024;
}

http {
    upstream kanban {
        server kanban:3000;
    }

    upstream fkandu-dashboard {
        server fkandu-dashboard:8000;
    }

    upstream fkandu-files {
        server fkandu-bot:8088;
    }

    server {
        listen 80;
        server_name kanban.yourdomain.com;

        location / {
            proxy_pass http://kanban;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 80;
        server_name dashboard.yourdomain.com;

        location / {
            proxy_pass http://fkandu-dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 80;
        server_name files.yourdomain.com;

        location / {
            proxy_pass http://fkandu-files;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Default server - catch all
    server {
        listen 80 default_server;
        server_name _;

        location / {
            return 404;
        }
    }
}
