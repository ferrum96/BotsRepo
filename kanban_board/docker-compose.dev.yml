services:
  kanban:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kanban-board
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - VITE_DEV_PORT=5173
      - VITE_API_PROXY=http://localhost:3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/app/data/prod.db
